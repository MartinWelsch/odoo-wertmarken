# Apache reverse proxy for the dockerised Odoo POS.
# Copy to /etc/apache2/sites-available/ (Debian/Ubuntu) and replace
# pos.example.com with your real subdomain.
#
# Enable required modules first:
#   sudo a2enmod proxy proxy_http proxy_wstunnel headers rewrite
#
# Then:  sudo a2ensite pos.example.com  &&  sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName pos.example.com

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyTimeout 3600

    # Tell Odoo the original protocol (needs proxy_mode = True in odoo.conf)
    RequestHeader set X-Forwarded-Proto "http"

    # WebSocket: Odoo's bus / POS live-sync. With the default single-process
    # setup this lives on 8069. If you set `workers = N` (N>0) in odoo.conf,
    # change 8069 -> 8072 on the two lines below.
    ProxyPass        /websocket  ws://127.0.0.1:8069/websocket
    ProxyPassReverse /websocket  ws://127.0.0.1:8069/websocket

    # Everything else -> Odoo HTTP
    ProxyPass        /  http://127.0.0.1:8069/  retry=0
    ProxyPassReverse /  http://127.0.0.1:8069/

    ErrorLog  ${APACHE_LOG_DIR}/odoo-pos_error.log
    CustomLog ${APACHE_LOG_DIR}/odoo-pos_access.log combined
</VirtualHost>

# ---------------------------------------------------------------------------
# After this works on HTTP, get a free TLS cert and let certbot rewrite this
# file into an HTTPS (*:443) vhost automatically:
#
#   sudo apt install certbot python3-certbot-apache
#   sudo certbot --apache -d pos.example.com
#
# certbot adds the :443 vhost + redirect. In that HTTPS vhost, make sure the
# forwarded-proto header is "https" (certbot usually leaves the proxy lines
# intact; just change the RequestHeader line to):
#       RequestHeader set X-Forwarded-Proto "https"
# ---------------------------------------------------------------------------
